<div
  class="upload-zone"
  [class.upload-zone--drag-over]="isDragOver()"
  [class.upload-zone--error]="validationError() !== null"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  (click)="openFileBrowser()"
  (keydown)="handleKeyDown($event)"
  tabindex="0"
  role="button"
  aria-label="Upload PDF file. Click or drag and drop."
>
  <!-- Hidden native file input — PDF only -->
  <input
    #fileInput
    type="file"
    accept="application/pdf,.pdf"
    class="upload-zone__input"
    aria-hidden="true"
    tabindex="-1"
    (change)="onFileInputChange($event)"
  />

  <div class="upload-zone__body">
    <!-- Cloud upload icon (inline SVG, no external dep) -->
    <div class="upload-zone__icon" aria-hidden="true">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="14" fill="var(--color-primary-light)" />
        <path
          d="M26 14v16m0-16-4 4m4-4 4 4"
          stroke="var(--color-primary)"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M16 34h20"
          stroke="var(--color-primary)"
          stroke-width="2.5"
          stroke-linecap="round"
        />
      </svg>
    </div>

    <h2 class="upload-zone__title">Drop your PDF here</h2>
    <p class="upload-zone__subtitle">
      or <span class="upload-zone__browse">click to browse</span>
    </p>
    <p class="upload-zone__hint">PDF files only · max 50 MB</p>

    @if (validationError() !== null) {
      <div class="upload-zone__error" role="alert">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="7" stroke="var(--color-error)" stroke-width="1.5" />
          <path d="M8 5v3.5M8 10.5v.5" stroke="var(--color-error)" stroke-width="1.5"
            stroke-linecap="round" />
        </svg>
        {{ validationError() }}
      </div>
    }
  </div>
</div>
